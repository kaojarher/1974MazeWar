<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAZE WAR 1973 // GUN P2P</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

:root {
  --g: #00ff41; --dg: #004d14; --b: #00e5ff;
  --r: #ff1744; --y: #ffab00; --bg: #000;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--g);
  font-family:'Share Tech Mono',monospace;overflow:hidden;touch-action:none}

/* CRT overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(to bottom,
    rgba(0,0,0,0.1) 0px,rgba(0,0,0,0.1) 1px,transparent 1px,transparent 3px)}

/* ── LOBBY ── */
#lobby{position:absolute;inset:0;z-index:200;display:flex;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#001800 0%,#000 80%)}

.panel{border:2px solid var(--g);
  box-shadow:0 0 24px var(--dg),inset 0 0 16px rgba(0,255,65,.04);
  padding:28px 36px;text-align:center;max-width:400px;width:94%}

.logo{font-family:'VT323',monospace;font-size:clamp(2rem,8vw,3.2rem);
  letter-spacing:6px;color:var(--g);text-shadow:0 0 14px var(--g);
  animation:flicker 5s infinite}
.sub{font-size:.6rem;letter-spacing:4px;color:var(--dg);margin-bottom:24px}

@keyframes flicker{
  0%,18%,20%,22%,25%,53%,55%,100%{opacity:1}
  19%,21%,24%,54%{opacity:.55}}

hr{border:none;border-top:1px solid var(--dg);margin:18px 0}
label{display:block;font-size:.62rem;letter-spacing:3px;color:var(--dg);
  margin-bottom:5px;text-align:left}

.row{display:flex;gap:8px;margin-bottom:14px}

input[type=text]{flex:1;background:#000;border:1px solid var(--g);
  color:var(--g);padding:10px;font-family:'VT323',monospace;font-size:1.5rem;
  letter-spacing:5px;text-align:center;text-transform:uppercase;outline:none;
  width:100%;transition:box-shadow .2s}
input[type=text]:focus{box-shadow:0 0 10px var(--g)}
input::placeholder{color:var(--dg);font-size:1rem;letter-spacing:2px}

.btn{background:#000;border:1px solid var(--g);color:var(--g);padding:10px 16px;
  font-family:'VT323',monospace;font-size:1.1rem;letter-spacing:2px;cursor:pointer;
  transition:all .15s}
.btn:hover,.btn:active{background:var(--g);color:#000;box-shadow:0 0 10px var(--g)}
.btn.big{width:100%;font-size:1.25rem;letter-spacing:4px;padding:13px}

.hint{font-size:.58rem;color:var(--dg);letter-spacing:2px;margin-top:12px;line-height:1.8}
#status{margin-top:12px;min-height:18px;font-size:.65rem;color:var(--y);letter-spacing:2px}

/* relay selector */
.relays{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.relay-btn{flex:1;min-width:80px;padding:6px 4px;font-size:.58rem;letter-spacing:1px;
  cursor:pointer;background:#000;border:1px solid var(--dg);color:var(--dg);
  font-family:inherit;transition:all .15s}
.relay-btn.on{border-color:var(--g);color:var(--g);box-shadow:0 0 5px var(--dg)}

/* ── GAME ── */
#game{position:absolute;inset:0;display:none}
canvas{display:block;image-rendering:pixelated;width:100%;height:100%}

.hud{position:absolute;top:12px;left:12px;z-index:10;font-size:.78rem;
  letter-spacing:2px;text-shadow:0 0 6px var(--g);pointer-events:none;line-height:2.1}
.bar{display:inline-block;width:70px;height:7px;border:1px solid var(--g);
  vertical-align:middle;margin-left:6px}
.fill{height:100%;background:var(--g);transition:width .3s}

#rbadge{position:absolute;top:12px;right:166px;z-index:10;
  font-family:'VT323',monospace;font-size:1rem;letter-spacing:3px;
  color:var(--y);text-shadow:0 0 6px var(--y);pointer-events:none}

#mmbox{position:absolute;top:12px;right:12px;width:150px;height:150px;
  border:1px solid var(--dg);background:rgba(0,18,0,.8)}
#mm{width:100%;height:100%}

.ctrl{position:absolute;bottom:28px;width:100%;display:flex;
  justify-content:space-between;padding:0 36px;z-index:50;pointer-events:none}
.jbase{width:88px;height:88px;border:2px solid rgba(0,255,65,.4);border-radius:50%;
  position:relative;pointer-events:auto;touch-action:none}
.jhandle{width:30px;height:30px;background:var(--g);border-radius:50%;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 10px var(--g);pointer-events:none}
#fire{pointer-events:auto;width:88px;height:88px;border-radius:50%;
  background:rgba(255,23,68,.12);border:2px solid var(--r);
  color:var(--r);font-family:'VT323',monospace;font-size:1.4rem;
  letter-spacing:2px;cursor:pointer;text-shadow:0 0 8px var(--r);
  transition:background .1s}
#fire:active{background:var(--r);color:#000}

#log{position:absolute;bottom:136px;left:12px;font-size:.6rem;
  color:rgba(0,255,65,.5);letter-spacing:1px;pointer-events:none;z-index:10;line-height:1.7}

.flash{position:absolute;inset:0;z-index:500;background:rgba(255,23,68,.2);
  pointer-events:none;opacity:0;transition:opacity .5s}

/* connection dot */
#dot{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--y);margin-right:6px;vertical-align:middle;
  animation:pulse 1s infinite}
#dot.on{background:var(--g);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="panel">
    <div class="logo">MAZE WAR</div>
    <div class="sub">1973 // GUN P2P EDITION</div>

    <label>GUN RELAY 節點（選一個最快的）</label>
    <div class="relays" id="relays"></div>

    <label>自訂戰場代碼（雙方輸入相同即可同房）</label>
    <div class="row">
      <input type="text" id="roomIn" maxlength="8" placeholder="SECTOR"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
      <button class="btn" onclick="rndRoom()">亂數</button>
    </div>

    <label>玩家代號</label>
    <input type="text" id="nameIn" maxlength="6" placeholder="PILOT"
      style="margin-bottom:16px"
      oninput="this.value=this.value.toUpperCase()">

    <button class="btn big" onclick="enter()">▶ 進入戰場</button>

    <div class="hint">
      雙方輸入相同戰場代碼 → 自動配對<br>
      GUN relay 提供穩定中繼，資料 P2P 加密傳輸<br>
      SPACE / 右下按鈕 開火 · WASD / 搖桿 移動
    </div>
    <div id="status"><span id="dot"></span>尚未連線</div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <canvas id="gc"></canvas>
  <div class="flash" id="flash"></div>

  <div class="hud">
    <span id="hname">---</span><br>
    HP <span class="bar"><span class="fill" id="hhp"></span></span> <span id="hhpn">10</span>/10<br>
    LV <span id="hlv">1</span> &nbsp; KILLS <span id="hkills">0</span><br>
    線上 <span id="hpeers">1</span>人
  </div>
  <div id="rbadge">SECTOR: <span id="rbroom">----</span></div>

  <div id="mmbox"><canvas id="mm" width="150" height="150"></canvas></div>
  <div id="log"></div>

  <div class="ctrl">
    <div id="joy" class="jbase"><div id="jh" class="jhandle"></div></div>
    <button id="fire">FIRE</button>
  </div>
</div>

<!-- GUN from CDN (multiple fallback) -->
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script>
// ─────────────────────────────
//  GUN RELAY OPTIONS
// ─────────────────────────────
const RELAYS = [
  { label:'GUN官方 #1', url:'https://gun-manhattan.herokuapp.com/gun' },
  { label:'GUN官方 #2', url:'https://gunjs.herokuapp.com/gun' },
  { label:'GUN社群',    url:'https://gun-us.herokuapp.com/gun' },
  { label:'備用節點',   url:'https://peer.wallie.io/gun' },
];

let chosenRelay = RELAYS[0].url;
const relayDiv = document.getElementById('relays');
RELAYS.forEach((r,i)=>{
  const b=document.createElement('button');
  b.className='relay-btn'+(i===0?' on':'');
  b.textContent=r.label;
  b.onclick=()=>{
    chosenRelay=r.url;
    relayDiv.querySelectorAll('.relay-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  };
  relayDiv.appendChild(b);
});

window.rndRoom = ()=>{
  const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  document.getElementById('roomIn').value=
    Array.from({length:6},()=>c[Math.random()*c.length|0]).join('');
};

// ─────────────────────────────
//  GAME STATE
// ─────────────────────────────
const MAP_SIZE=22;
let map=[],enemies=[],bullets=[],lasers=[];
let me={ x:1.5,y:1.5,dir:0,hp:10,maxHp:10,kills:0,lv:1,name:'PILOT',uid:'' };
let peers={};   // uid -> state
let isHost=false;
let gun,room_node;
let keys={},joyX=0,joyY=0;
let msgs=[];

function setStatus(t,on=false){
  document.getElementById('status').innerHTML=
    `<span id="dot" class="${on?'on':''}"></span>${t}`;
}

// ─────────────────────────────
//  ENTER
// ─────────────────────────────
window.enter = ()=>{
  const code=document.getElementById('roomIn').value.trim();
  const name=document.getElementById('nameIn').value.trim()||'PILOT';
  if(!code||code.length<2){ setStatus('請輸入至少 2 位戰場代碼'); return; }

  me.name=name;
  me.uid=name+'_'+Math.random().toString(36).slice(2,5).toUpperCase();
  document.getElementById('rbroom').textContent=code;
  document.getElementById('hname').textContent=name;

  setStatus('正在連接 '+chosenRelay+' ...');

  // init GUN with chosen relay
  gun=Gun({ peers:[chosenRelay], localStorage:false });
  room_node=gun.get('mazewars_v3').get(code);

  // 監聽所有玩家同步
  room_node.get('players').map().on((data,uid)=>{
    if(!data||uid===me.uid) return;
    if(!peers[uid]) { logMsg('+ '+uid.slice(0,8)+' 進入戰場'); }
    peers[uid]=data;
    // 第一次收到別人資料且自己是最早進入者就成為 host
    checkHost();
  });

  // 監聽敵人狀態（host 廣播）
  room_node.get('world').on((data)=>{
    if(!data||isHost) return;
    try{
      const w=JSON.parse(data);
      if(w.enemies) enemies=w.enemies;
      if(w.lv) me.lv=w.lv;
    }catch(e){}
  });

  // 監聽射擊事件
  room_node.get('shots').map().on((data,key)=>{
    if(!data||!isHost) return;
    try{
      const s=JSON.parse(data);
      if(s.uid!==me.uid && Date.now()-s.ts<2000){
        handleShoot(s.uid,s.dir,s.x,s.y);
      }
    }catch(e){}
  });

  // 監聽命中事件
  room_node.get('hits').map().on((data,key)=>{
    if(!data) return;
    try{
      const h=JSON.parse(data);
      if(h.target===me.uid && Date.now()-h.ts<2000){
        me.hp=Math.max(0,me.hp-h.dmg);
        flashDmg(); updateHUD();
        if(me.hp<=0) respawn();
      }
    }catch(e){}
  });

  // 廣播自己上線
  room_node.get('players').get(me.uid).put({ uid:me.uid, name:me.name,
    x:me.x, y:me.y, dir:me.dir, hp:me.hp, ts:Date.now() });

  setStatus('',true);
  setTimeout(checkHost, 1500);

  startGame();
};

function checkHost(){
  // 若一秒內沒有任何 peer 或已是 host
  if(isHost) return;
  const otherTs=Object.values(peers).map(p=>p.ts||0);
  const allOlder=otherTs.every(t=>t>me._startTs);
  // 最小 uid 的人當 host（確定性）
  const myKey=me.uid;
  const allKeys=[myKey,...Object.keys(peers)].sort();
  if(allKeys[0]===myKey){
    isHost=true;
    logMsg('你是本局 HOST');
    initLevel();
  }
}
// 記錄自己的進入時間
window.addEventListener('DOMContentLoaded',()=>{ me._startTs=Date.now(); });

// ─────────────────────────────
//  MAZE (recursive backtracker)
// ─────────────────────────────
function initLevel(){
  map=Array.from({length:MAP_SIZE},()=>Array(MAP_SIZE).fill(1));
  const vis=Array.from({length:MAP_SIZE},()=>Array(MAP_SIZE).fill(false));
  function carve(x,y){
    vis[y][x]=true; map[y][x]=0;
    [[0,-2],[2,0],[0,2],[-2,0]].sort(()=>Math.random()-.5).forEach(([dx,dy])=>{
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<MAP_SIZE-1&&ny>0&&ny<MAP_SIZE-1&&!vis[ny][nx]){
        map[y+dy/2][x+dx/2]=0; carve(nx,ny);
      }
    });
  }
  carve(1,1);
  map[1][1]=0; me.x=1.5; me.y=1.5;

  enemies=[];
  const cnt=3+me.lv*2;
  for(let i=0;i<cnt;i++){
    let ex,ey;
    do{ex=Math.floor(Math.random()*MAP_SIZE);ey=Math.floor(Math.random()*MAP_SIZE);}
    while(map[ey][ex]!==0||(Math.abs(ex-1)<3&&Math.abs(ey-1)<3));
    enemies.push({x:ex+.5,y:ey+.5,dir:Math.random()*Math.PI*2,hp:2,alive:true,id:'e'+i});
  }
  bullets=[]; lasers=[];
  broadcastWorld();
}

// ─────────────────────────────
//  GAME LOOP
// ─────────────────────────────
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
const mm=document.getElementById('mm');
const mmc=mm.getContext('2d');
let lastT=0;

function startGame(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='block';
  resize(); setupCtrl();
  requestAnimationFrame(loop);
}

function loop(ts=0){
  const dt=Math.min((ts-lastT)/1000,.05); lastT=ts;
  update(dt); draw(); syncGun();
  requestAnimationFrame(loop);
}

// ─────────────────────────────
//  UPDATE
// ─────────────────────────────
function update(dt){
  if(!map.length) return;
  const spd=2.5*dt, rot=2*dt;
  let mx=0,my=0;
  if(keys['KeyW']||keys['ArrowUp'])   {mx+=Math.cos(me.dir)*spd;my+=Math.sin(me.dir)*spd}
  if(keys['KeyS']||keys['ArrowDown']) {mx-=Math.cos(me.dir)*spd;my-=Math.sin(me.dir)*spd}
  if(keys['KeyA'])  me.dir-=rot;
  if(keys['KeyD'])  me.dir+=rot;
  if(keys['ArrowLeft'])  me.dir-=rot;
  if(keys['ArrowRight']) me.dir+=rot;
  if(Math.abs(joyX)>.1||Math.abs(joyY)>.1){
    me.dir=Math.atan2(joyY,joyX);
    const m=Math.hypot(joyX,joyY);
    mx+=joyX*spd*m; my+=joyY*spd*m;
  }
  move(mx,my);

  // laser decay
  lasers=lasers.filter(l=>{ l.life-=dt; return l.life>0; });

  // bullets
  bullets=bullets.filter(b=>{
    b.x+=Math.cos(b.dir)*6*dt; b.y+=Math.sin(b.dir)*6*dt; b.life-=dt;
    if(b.life<=0) return false;
    if(map[Math.floor(b.y)]?.[Math.floor(b.x)]===1) return false;
    if(isHost){
      for(const en of enemies){
        if(en.alive&&Math.hypot(b.x-en.x,b.y-en.y)<.5){
          en.alive=false;
          if(b.owner===me.uid){me.kills++;updateHUD()}
          if(enemies.every(e=>!e.alive)){me.lv++;initLevel();logMsg('LV UP! ▶ '+ me.lv)}
          return false;
        }
      }
    }
    return true;
  });

  // enemy AI (host only)
  if(isHost){
    enemies.forEach(en=>{
      if(!en.alive) return;
      const nx=en.x+Math.cos(en.dir)*.8*dt;
      const ny=en.y+Math.sin(en.dir)*.8*dt;
      if(map[Math.floor(ny)]?.[Math.floor(nx)]===0){en.x=nx;en.y=ny}
      else en.dir+=Math.PI*.5*(Math.random()>.5?1:-1);
      // 偶爾攻擊玩家
      if(Math.random()<.004&&Math.hypot(en.x-me.x,en.y-me.y)<5){
        me.hp=Math.max(0,me.hp-1); flashDmg(); updateHUD();
        if(me.hp<=0) respawn();
      }
    });
    // 廣播世界狀態（每 60 幀一次）
    if((lastT|0)%60===0) broadcastWorld();
  }
}

function move(mx,my){
  if(!map.length) return;
  if(map[Math.floor(me.y)]?.[Math.floor(me.x+mx)]===0) me.x+=mx;
  if(map[Math.floor(me.y+my)]?.[Math.floor(me.x)]===0) me.y+=my;
}

// ─────────────────────────────
//  SHOOT
// ─────────────────────────────
function shoot(){
  // 沿射擊方向逐步前進，碰牆停止
  const ldx=Math.cos(me.dir), ldy=Math.sin(me.dir);
  let d=0.1, lx=me.x, ly=me.y;
  while(d<18){
    d+=0.1;
    const nx=me.x+ldx*d, ny=me.y+ldy*d;
    if(map[Math.floor(ny)]?.[Math.floor(nx)]===1) break;
    lx=nx; ly=ny;
  }
  lasers.push({ ox:me.x, oy:me.y, tx:lx, ty:ly, dir:me.dir, life:0.35 });

  bullets.push({x:me.x+Math.cos(me.dir)*.7,y:me.y+Math.sin(me.dir)*.7,
    dir:me.dir,life:1.5,owner:me.uid});
  if(isHost){ handleShoot(me.uid,me.dir,me.x,me.y); }
  else if(room_node){
    const key='s'+me.uid+Date.now();
    room_node.get('shots').get(key).put(
      JSON.stringify({uid:me.uid,dir:me.dir,x:me.x,y:me.y,ts:Date.now()}));
  }
}

// Check if there is a clear line-of-sight between two world points (no walls)
function hasLOS(x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1;
  const dist=Math.hypot(dx,dy);
  const steps=Math.ceil(dist/0.1);
  for(let i=1;i<steps;i++){
    const t=i/steps;
    const cx=x1+dx*t, cy=y1+dy*t;
    if(map[Math.floor(cy)]?.[Math.floor(cx)]===1) return false;
  }
  return true;
}

function handleShoot(uid,dir,sx,sy){
  enemies.forEach(en=>{
    if(!en.alive) return;
    const a=Math.atan2(en.y-sy,en.x-sx);
    let da=a-dir; while(da>Math.PI)da-=2*Math.PI; while(da<-Math.PI)da+=2*Math.PI;
    if(Math.abs(da)<.22&&Math.hypot(en.x-sx,en.y-sy)<10&&hasLOS(sx,sy,en.x,en.y)){
      en.alive=false;
      if(uid===me.uid){me.kills++;updateHUD()}
      if(enemies.every(e=>!e.alive)){me.lv++;initLevel();logMsg('LV UP! ▶ '+me.lv)}
    }
  });
  // 擊中其他玩家
  Object.values(peers).forEach(p=>{
    if(!p.x) return;
    const a=Math.atan2(p.y-sy,p.x-sx);
    let da=a-dir; while(da>Math.PI)da-=2*Math.PI; while(da<-Math.PI)da+=2*Math.PI;
    if(Math.abs(da)<.18&&Math.hypot(p.x-sx,p.y-sy)<8&&hasLOS(sx,sy,p.x,p.y)){
      const key='h'+Date.now();
      room_node.get('hits').get(key).put(JSON.stringify({target:p.uid,dmg:2,ts:Date.now()}));
    }
  });
}

function respawn(){
  logMsg('陣亡！重生中...');
  me.hp=me.maxHp; me.x=1.5; me.y=1.5; updateHUD();
}

// ─────────────────────────────
//  DDA RAYCASTING RENDERER (Gemini-style)
// ─────────────────────────────
function draw(){
  if(!map.length){ctx.fillStyle='#000';ctx.fillRect(0,0,gc.width,gc.height);return}
  const W=gc.width, H=gc.height;
  const fd=me.dir;
  const FOV=Math.PI/3;

  // Clear background
  ctx.fillStyle='#000000';
  ctx.fillRect(0,0,W,H);

  // Ceiling
  ctx.fillStyle='#0d0d0d';
  ctx.fillRect(0,0,W,H/2);
  // Floor
  ctx.fillStyle='#001505';
  ctx.fillRect(0,H/2,W,H/2);

  // ── DDA Raycasting walls ──
  const numRays=W;
  const rayStep=FOV/numRays;
  const zBuf=new Float32Array(numRays);

  ctx.lineWidth=1;
  for(let i=0;i<numRays;i++){
    const rayDir=fd-(FOV/2)+(i*rayStep);
    const eyeX=Math.cos(rayDir), eyeY=Math.sin(rayDir);

    let mapX=Math.floor(me.x), mapY=Math.floor(me.y);
    const deltaDistX=Math.abs(1/eyeX), deltaDistY=Math.abs(1/eyeY);
    let sideDistX, sideDistY, stepX, stepY, side=0;

    if(eyeX<0){ stepX=-1; sideDistX=(me.x-mapX)*deltaDistX; }
    else       { stepX= 1; sideDistX=(mapX+1-me.x)*deltaDistX; }
    if(eyeY<0){ stepY=-1; sideDistY=(me.y-mapY)*deltaDistY; }
    else       { stepY= 1; sideDistY=(mapY+1-me.y)*deltaDistY; }

    let hit=false;
    while(!hit){
      if(sideDistX<sideDistY){ sideDistX+=deltaDistX; mapX+=stepX; side=0; }
      else                   { sideDistY+=deltaDistY; mapY+=stepY; side=1; }
      if(map[mapY]?.[mapX]===1) hit=true;
    }

    let hitDist;
    if(side===0) hitDist=(mapX-me.x+(1-stepX)/2)/eyeX;
    else         hitDist=(mapY-me.y+(1-stepY)/2)/eyeY;

    // Fish-eye correction
    const corrAngle=rayDir-fd;
    hitDist=hitDist*Math.cos(corrAngle);
    zBuf[i]=hitDist;

    const wallH=H/hitDist;
    const drawStart=Math.max(0, -wallH/2+H/2);
    const drawEnd  =Math.min(H-1, wallH/2+H/2);

    // Distance fog brightness
    let brightness=Math.min(255, Math.floor(255/(hitDist/4+0.5)));
    if(side===1) brightness=brightness*0.55|0; // Y-side darker

    // Wireframe style: draw wall-top line, wall-bottom line, then column
    // Column fill (solid wall face)
    ctx.fillStyle=`rgb(0,${brightness*0.18|0},0)`;
    ctx.fillRect(i, drawStart, 1, drawEnd-drawStart);

    // Top edge line (bright green)
    ctx.strokeStyle=`rgb(0,${brightness},0)`;
    ctx.beginPath(); ctx.moveTo(i,drawStart); ctx.lineTo(i,drawStart+1); ctx.stroke();
    // Bottom edge line
    ctx.beginPath(); ctx.moveTo(i,drawEnd); ctx.lineTo(i,drawEnd+1); ctx.stroke();
  }

  // ── Sprites (enemies + peers) rendered as eyeballs in screen space ──
  const allSprites=[];
  enemies.forEach(en=>{ if(en.alive) allSprites.push({x:en.x,y:en.y,col:'#00ff41',lbl:''}); });
  Object.values(peers).forEach(p=>{ if(p.x!=null) allSprites.push({x:p.x,y:p.y,col:'#00e5ff',lbl:p.name||'?'}); });
  allSprites.sort((a,b)=>Math.hypot(b.x-me.x,b.y-me.y)-Math.hypot(a.x-me.x,a.y-me.y));
  allSprites.forEach(s=>drawEye(s.x,s.y,zBuf,s.col,s.lbl,W,H,FOV));

  // ── Laser beam ──
  lasers.forEach(l=>{
    const t=l.life/0.35;
    const ex=l.tx-me.x, ey=l.ty-me.y;
    let ang=Math.atan2(ey,ex)-fd;
    while(ang<-Math.PI)ang+=Math.PI*2; while(ang>Math.PI)ang-=Math.PI*2;
    const endX=(ang/FOV+0.5)*W, endY=H/2;
    const gunX=W/2, gunY=H*0.88;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.lineWidth=3*t;
    ctx.strokeStyle=`rgba(0,255,80,${t*0.5})`;
    ctx.shadowColor='#0f0'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(gunX,gunY); ctx.lineTo(endX,endY); ctx.stroke();
    ctx.lineWidth=1*t;
    ctx.strokeStyle=`rgba(220,255,200,${t})`;
    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.moveTo(gunX,gunY); ctx.lineTo(endX,endY); ctx.stroke();
    ctx.restore();
  });

  drawMM();
}

function drawEye(sx,sy,zBuf,col,lbl,W,H,FOV){
  const dx=sx-me.x, dy=sy-me.y, dist=Math.hypot(dx,dy);
  if(dist<0.4) return;
  let ang=Math.atan2(dy,dx)-me.dir;
  while(ang<-Math.PI)ang+=Math.PI*2; while(ang>Math.PI)ang-=Math.PI*2;
  if(Math.abs(ang)>FOV*0.55) return;
  const screenX=(ang/FOV+0.5)*W;
  const pr=Math.max(5, (H/2)*0.45/dist);
  const HH=H/2;
  // z-test across sprite width
  let vis=false;
  for(let c=Math.max(0,(screenX-pr)|0);c<=Math.min(W-1,(screenX+pr)|0);c++){
    if(zBuf[c]>=dist){vis=true;break;}
  }
  if(!vis) return;
  ctx.save();
  ctx.globalAlpha=Math.min(1,Math.max(0.6,1-dist/10));
  ctx.lineWidth=1.5; ctx.strokeStyle=col;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(screenX,HH,pr,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(screenX,HH,pr*0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(screenX-pr*0.28,HH-pr*0.28,pr*0.14,0,Math.PI*2); ctx.fill();
  ctx.restore();
  if(lbl){ctx.fillStyle=col;ctx.font='bold 11px Share Tech Mono';ctx.fillText(lbl,screenX-14,HH-pr-6);}
}

function drawMM(){
  const S=150,cs=S/MAP_SIZE;
  mmc.fillStyle='#000'; mmc.fillRect(0,0,S,S);
  for(let y=0;y<MAP_SIZE;y++) for(let x=0;x<MAP_SIZE;x++){
    mmc.fillStyle=map[y]?.[x]===1?'#003d11':'#000';
    mmc.fillRect(x*cs,y*cs,cs,cs);
  }
  enemies.forEach(en=>{
    if(!en.alive) return;
    mmc.fillStyle='#0f0'; mmc.fillRect(en.x*cs-1,en.y*cs-1,3,3);
  });
  Object.values(peers).forEach(p=>{
    if(p.x){mmc.fillStyle='#0ef'; mmc.fillRect(p.x*cs-2,p.y*cs-2,4,4)}
  });
  mmc.fillStyle='#fff'; mmc.fillRect(me.x*cs-2,me.y*cs-2,5,5);
  mmc.strokeStyle='rgba(255,255,255,.25)';
  mmc.beginPath();
  mmc.moveTo(me.x*cs,me.y*cs);
  mmc.lineTo((me.x+Math.cos(me.dir-Math.PI/6)*5)*cs,(me.y+Math.sin(me.dir-Math.PI/6)*5)*cs);
  mmc.moveTo(me.x*cs,me.y*cs);
  mmc.lineTo((me.x+Math.cos(me.dir+Math.PI/6)*5)*cs,(me.y+Math.sin(me.dir+Math.PI/6)*5)*cs);
  mmc.stroke();
}

// ─────────────────────────────
//  GUN SYNC
// ─────────────────────────────
let syncTick=0;
function syncGun(){
  if(!room_node) return;
  syncTick++;
  if(syncTick%4!==0) return; // ~15fps
  room_node.get('players').get(me.uid).put({
    uid:me.uid, name:me.name,
    x:me.x, y:me.y, dir:me.dir, hp:me.hp, ts:Date.now()
  });
  document.getElementById('hpeers').textContent=Object.keys(peers).length+1;
}

function broadcastWorld(){
  if(!room_node||!isHost) return;
  room_node.get('world').put(JSON.stringify({
    enemies: enemies.map(e=>({x:e.x,y:e.y,dir:e.dir,alive:e.alive,id:e.id})),
    lv: me.lv, ts: Date.now()
  }));
}

// ─────────────────────────────
//  HUD / FX
// ─────────────────────────────
function updateHUD(){
  document.getElementById('hhp').style.width=(me.hp/me.maxHp*100)+'%';
  document.getElementById('hhpn').textContent=me.hp;
  document.getElementById('hlv').textContent=me.lv;
  document.getElementById('hkills').textContent=me.kills;
}
function flashDmg(){
  const f=document.getElementById('flash');
  f.style.transition='none'; f.style.opacity='1';
  requestAnimationFrame(()=>{ f.style.transition='opacity .5s'; f.style.opacity='0'; });
}
function logMsg(t){
  msgs.push(t); if(msgs.length>4) msgs.shift();
  document.getElementById('log').innerHTML=msgs.map(m=>'> '+m).join('<br>');
}

// ─────────────────────────────
//  CONTROLS
// ─────────────────────────────
function setupCtrl(){
  window.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(e.code==='Space'){e.preventDefault();shoot()}
  });
  window.addEventListener('keyup',e=>keys[e.code]=false);
  document.getElementById('fire').addEventListener('pointerdown',e=>{e.preventDefault();shoot()});

  const joy=document.getElementById('joy');
  const jh=document.getElementById('jh');
  const R=28; let active=false,ox=0,oy=0;
  function js(cx,cy){
    active=true;
    const r=joy.getBoundingClientRect();
    ox=r.left+r.width/2; oy=r.top+r.height/2;
  }
  function jm(cx,cy){
    if(!active) return;
    let dx=cx-ox,dy=cy-oy;
    const m=Math.hypot(dx,dy);
    if(m>R){dx=dx/m*R;dy=dy/m*R}
    jh.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    joyX=dx/R; joyY=dy/R;
  }
  function je(){active=false;joyX=0;joyY=0;jh.style.transform='translate(-50%,-50%)'}
  joy.addEventListener('touchstart',e=>{e.preventDefault();js(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
  joy.addEventListener('touchmove', e=>{e.preventDefault();jm(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
  joy.addEventListener('touchend',  e=>{e.preventDefault();je()},{passive:false});
  joy.addEventListener('mousedown', e=>js(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>jm(e.clientX,e.clientY));
  window.addEventListener('mouseup', je);
}

function resize(){gc.width=window.innerWidth;gc.height=window.innerHeight}
window.addEventListener('resize',resize);
</script>
